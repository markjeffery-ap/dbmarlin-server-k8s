apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

components:
  - ../../components/statefulset

patches:
  - path: storageclass-patch.yaml

images:
  - name: dbmarlin/dbmarlin-server
    newName: dbmarlin/dbmarlin-server
    newTag: 5.8.0

generatorOptions:

  disableNameSuffixHash: true
